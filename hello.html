<script>


var map = L.map('map').setView([48.856614, 2.3522219], 10);

var geoJsonStates = L.geoJson(shark, {
    style: function (feature) {
        // Define your styling logic based on feature properties
        return {
            fillColor: 'green',  // Example color, modify as needed
            color: 'white',
            weight: 1,
            dashArray: '3',
            fillOpacity: 0.7
        };
    },
    onEachFeature: function (feature, layer) {
    // Define actions for each feature  
    var popupContent = `
        <strong>timestamp:</strong> ${feature.properties.timestamp} <br/>
        `;
    
    layer.bindPopup(popupContent);
}


}).addTo(map);


//google map
googleHybrid = L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',{
    maxZoom: 40,
    subdomains:['mt0','mt1','mt2','mt3']
});

googleHybrid.addTo(map);

// layers from geoserver
var mf = L.tileLayer.wms("http://localhost:8080/geoserver/wms", {
    layers: "tajikistan:Hazard_Mudflow",
    format: "image/png",
    transparent: true,
    attribution: "mylayer",
  })
  mf.addTo(map)
var baselayer = {
    "water color": googleHybrid,
}
var overlayers = {
    'Mudflow': mf,
}
var drawnItems = new L.FeatureGroup();
     map.addLayer(drawnItems);
     var drawControl = new L.Control.Draw({
     	// position: 'topright',
		     	draw: {
		    polygon: {
		     shapeOptions: {
		      color: 'purple'
		     },
		     allowIntersection: false,
		     drawError: {
		      color: 'orange',
		      timeout: 1000
		     },
		    },
		    polyline: {
		     shapeOptions: {
		      color: 'red'
		     },
		    },
		    rect: {
		     shapeOptions: {
		      color: 'green'
		     },
		    },
		    circle: {
		     shapeOptions: {
		      color: 'steelblue'
		     },
		    },
		   },
         edit: {
             featureGroup: drawnItems
         }
     });
     map.addControl(drawControl);
      map.on('draw:created', function (e) {
            var type = e.layerType,
                layer = e.layer;
            drawnItems.addLayer(layer);
        });


    L.control.locate().addTo(map);
    L.Control.geocoder({
        geocoder: L.Control.Geocoder.nominatim()
      }).addTo(map);


function runDirection(start, end) {
        
        // recreating new map layer after removal
        var map = L.map('map').setView([35.873132, -5.523136], 14);
        googleHybrid = L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',{
        maxZoom: 40,
        subdomains:['mt0','mt1','mt2','mt3']
        });

        googleHybrid.addTo(map);
        var dir = MQ.routing.directions();

        dir.route({
            locations: [
                start,
                end
            ]
        });
        var drawnItems = new L.FeatureGroup();
     map.addLayer(drawnItems);
     var drawControl = new L.Control.Draw({
     	// position: 'topright',
		     	draw: {
		    polygon: {
		     shapeOptions: {
		      color: 'purple'
		     },
		     allowIntersection: false,
		     drawError: {
		      color: 'orange',
		      timeout: 1000
		     },
		    },
		    polyline: {
		     shapeOptions: {
		      color: 'red'
		     },
		    },
		    rect: {
		     shapeOptions: {
		      color: 'green'
		     },
		    },
		    circle: {
		     shapeOptions: {
		      color: 'steelblue'
		     },
		    },
		   },
         edit: {
             featureGroup: drawnItems
         }
     });
     map.addControl(drawControl);
      map.on('draw:created', function (e) {
            var type = e.layerType,
                layer = e.layer;
            drawnItems.addLayer(layer);
        });

        L.control.locate().addTo(map);

        CustomRouteLayer = MQ.Routing.RouteLayer.extend({
            createStartMarker: (location) => {
                var custom_icon;
                var marker;

                custom_icon = L.icon({
                    iconUrl: 'img/red.png',
                    iconSize: [20, 29],
                    iconAnchor: [10, 29],
                    popupAnchor: [0, -29]
                });

                marker = L.marker(location.latLng, {icon: custom_icon}).addTo(map);

                return marker;
            },

            createEndMarker: (location) => {
                var custom_icon;
                var marker;

                custom_icon = L.icon({
                    iconUrl: 'img/blue.png',
                    iconSize: [20, 29],
                    iconAnchor: [10, 29],
                    popupAnchor: [0, -29]
                });

                marker = L.marker(location.latLng, {icon: custom_icon}).addTo(map);

                return marker;
            }
        });
        
        map.addLayer(new CustomRouteLayer({
            directions: dir,
            fitBounds: true
        })); 
    }


// function that runs when form submitted
function submitForm(event) {
    event.preventDefault();

    // delete current map layer
    map.remove();

    // getting form data
    start = document.getElementById("start").value;
    end = document.getElementById("destination").value;

    // run directions function
    runDirection(start, end);

    // reset form
    document.getElementById("form").reset();
}

// asign the form to form variable
const form = document.getElementById('form');

// call the submitForm() function when submitting the form
form.addEventListener('submit', submitForm);

    var taxiIcon = L.icon({
			iconUrl: 'img/taxi.png',
			iconSize: [50, 50]
		})

		var marker = L.marker([35.87652818832377, -5.520514837968671], { icon: taxiIcon }).addTo(map);

		map.on('click', function (e) {
			console.log(e)
			var newMarker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
			L.Routing.control({
				waypoints: [
					L.latLng(35.87652818832377, -5.520514837968671),
					L.latLng(e.latlng.lat, e.latlng.lng)
				]
			}).on('routesfound', function (e) {
				var routes = e.routes;
				console.log(routes);

				e.routes[0].coordinates.forEach(function (coord, index) {
					setTimeout(function () {
						marker.setLatLng([coord.lat, coord.lng]);
					}, 100 * index)
				})

			}).addTo(map);
		});
</script>
